CONFIG_SERIAL=y
CONFIG_LOG=y
CONFIG_LOG_MODE_MINIMAL=n
CONFIG_REBOOT=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Dimension 2.2: Memory Attributes and MPU for Zero-copy
CONFIG_ARM_MPU=y
CONFIG_MEM_ATTR=y

# Dimension 2.3: Flash Image support for M0 Hot-update
CONFIG_TFM_IPC=y
CONFIG_BUILD_WITH_TFM=y
CONFIG_TFM_PROFILE_TYPE_MEDIUM=y
CONFIG_TFM_QCBOR_PATH="/workspaces/applications/lib/qcbor"
CONFIG_BOOTLOADER_MCUBOOT=y

# Dimension 3.1: Attestation and Watchdog Linkage
CONFIG_WATCHDOG=y
CONFIG_WDT_V32F20X=y

# Control library (PID, LESO, Spectrum)
CONFIG_CONTROL=y
CONFIG_CONTROL_SPECTRUM=y

# Math library (sinf, cosf for signal generation)
CONFIG_NEWLIB_LIBC=y
