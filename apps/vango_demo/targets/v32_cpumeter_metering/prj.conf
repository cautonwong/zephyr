# Feature Switches
CONFIG_APP_FEATURE_METERING=y

# Subsystem Support
CONFIG_ADC=y
CONFIG_GPIO=y
CONFIG_LOG=y
CONFIG_SERIAL=y

# V32F20X Specific Driver Selection
CONFIG_ADC_V32F20X=y
CONFIG_V32F20X_GPIO=y
CONFIG_V32F20X_UART=y
CONFIG_CLOCK_CONTROL_V32F20X=y
CONFIG_RESET_V32F20X=y

# FlashDB
CONFIG_FLASHDB=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Scheme A: Coredump for Post-Mortem Debugging
CONFIG_DEBUG_COREDUMP=y
CONFIG_DEBUG_COREDUMP_BACKEND_LOGGING=y

# Scheme C: Tracing for Performance Analysis
CONFIG_TRACING=y
# CONFIG_SEGGER_SYSTEMVIEW=y (Disabled due to missing HAS_SEGGER_RTT)
# CONFIG_USE_SEGGER_RTT=y
# CONFIG_SEGGER_RTT_MAX_NUM_UP_BUFFERS=3

# Fix for SystemView string concatenation

# IPC Service (ICMSG Backend)
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
CONFIG_MBOX=y

# Issue #6: MCUboot Readiness
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_REBOOT=y

# Issue #7: Advanced Power Management
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y

# Dimension 2.2: Memory Attributes and MPU for Zero-copy
CONFIG_ARM_MPU=y
CONFIG_MEM_ATTR=y
