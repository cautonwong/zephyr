# Feature Switches
CONFIG_APP_FEATURE_COMMS=y
CONFIG_APP_FEATURE_SECURITY=y

# Subsystem Support
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_DMA=y
CONFIG_LOG=y

# FlashDB
CONFIG_FLASHDB=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_BACKEND_SERIAL=y
