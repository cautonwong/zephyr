# Feature Switches
CONFIG_APP_FEATURE_COMMS=y
CONFIG_APP_FEATURE_SECURITY=y

# Subsystem Support
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_DMA=y
CONFIG_LOG=y

# FlashDB
CONFIG_FLASHDB=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_BACKEND_SERIAL=y

# IPC Service (ICMSG Backend)
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
CONFIG_MBOX=y

# Issue #4: Modbus-RTU Client Support
CONFIG_MODBUS=y
CONFIG_MODBUS_ROLE_CLIENT=y
CONFIG_MODBUS_SERIAL=y
