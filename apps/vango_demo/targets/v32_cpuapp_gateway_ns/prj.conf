# Feature Switches
CONFIG_APP_FEATURE_COMMS=y
CONFIG_APP_FEATURE_SECURITY=y
CONFIG_APP_FEATURE_LOW_POWER=y
CONFIG_APP_FEATURE_OTA=y

# Subsystem Support
CONFIG_SERIAL=y
CONFIG_UART_ASYNC_API=y
CONFIG_DMA=y
CONFIG_LOG=y

# FlashDB
CONFIG_FLASHDB=y
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_HISTORY=y
CONFIG_SHELL_BACKEND_SERIAL=y

# IPC Service
CONFIG_IPC_SERVICE=y
CONFIG_IPC_SERVICE_BACKEND_ICMSG=y
CONFIG_MBOX=y

# Entropy (Required for TCP/PPP)
CONFIG_ENTROPY_GENERATOR=y
CONFIG_ENTROPY_V32F20X=y
CONFIG_TEST_RANDOM_GENERATOR=y

# Issue #4: Modbus-RTU Client
CONFIG_MODBUS=y
CONFIG_MODBUS_ROLE_CLIENT=y
CONFIG_MODBUS_SERIAL=y

# Issue #5: Networking and 4G Modem Support
CONFIG_NETWORKING=y
CONFIG_NET_L2_PPP=y
CONFIG_NET_IPV4=y
CONFIG_NET_ARP=n
CONFIG_NET_UDP=y
CONFIG_NET_TCP=y
CONFIG_NET_MAX_CONTEXTS=10

# Modem Framework
CONFIG_MODEM=y
CONFIG_MODEM_CONTEXT=y
CONFIG_MODEM_IFACE_UART=y
CONFIG_MODEM_CMD_HANDLER=y
CONFIG_MODEM_QUECTEL_BG9X=y

# IP Management
CONFIG_NET_CONFIG_SETTINGS=y
CONFIG_NET_CONFIG_MY_IPV4_ADDR="0.0.0.0"
CONFIG_DNS_RESOLVER=y

# Memory Optimization
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32

CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_NET_L2_PPP_TIMEOUT=30

# GPIO is required for Modem pins
CONFIG_GPIO=y
CONFIG_GPIO_V32F20X=y
CONFIG_BASE64=y

# Issue #6: MCUboot & OTA Readiness
CONFIG_BOOTLOADER_MCUBOOT=y
CONFIG_IMG_MANAGER=y
CONFIG_STREAM_FLASH=y
CONFIG_IMG_BLOCK_BUF_SIZE=512
CONFIG_REBOOT=y

# Disable MCUMGR for Serial-based OTA to save space for WASM sandbox
CONFIG_ZCBOR=n
CONFIG_MCUMGR=n
CONFIG_MCUMGR_TRANSPORT_SHELL=n
CONFIG_MCUMGR_GRP_IMG=n
CONFIG_MCUMGR_GRP_OS=n

# Issue #7: Advanced Power Management
CONFIG_PM=y
CONFIG_PM_DEVICE=y
CONFIG_PM_DEVICE_RUNTIME=y
CONFIG_JANPATCH=y

# Dimension 2.2: Memory Attributes and MPU for Zero-copy
CONFIG_ARM_MPU=y
CONFIG_MEM_ATTR=y

# Dimension 2.3: Flash Image support for M0 Hot-update
CONFIG_TFM_IPC=y
CONFIG_BUILD_WITH_TFM=y
CONFIG_TFM_PROFILE_TYPE_MEDIUM=y

# Dimension 3.1: Attestation and Watchdog Linkage
CONFIG_WATCHDOG=y
CONFIG_WDT_V32F20X=y
CONFIG_TFM_PARTITION_INITIAL_ATTESTATION=y

# Dimension 4.1: WebAssembly Business Isolation Sandbox
CONFIG_APP_FEATURE_WASM_SANDBOX=y
CONFIG_HEAP_MEM_POOL_SIZE=49152

CONFIG_SIM_AXON=y

