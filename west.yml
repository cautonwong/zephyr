manifest:
  self:
    west-commands: scripts/west-commands.yml

  remotes:
    - name: zephyrproject-rtos
      url-base: https://github.com/zephyrproject-rtos
    - name: cautonwong
      url-base: https://github.com/cautonwong

  projects:
    - name: zephyr
      remote: zephyrproject-rtos
      revision: main
      import:
        name-allowlist:
          - cmsis_6
          - hal_nordic
          - hal_stm32

    # Zephyr Modules Repository
    - name: zephyr_modules
      remote: cautonwong
      revision: main
      path: modules
